name: Tests

on:
  push:
    branches:
      - main
      - claude/**
  pull_request:
  workflow_dispatch:

jobs:
  scraper:
    name: Scraper (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scraper/requirements-dev.txt
      - name: Install deps
        working-directory: scraper
        run: pip install -r requirements-dev.txt
      - name: Run tests
        working-directory: scraper
        run: pytest -q

  web:
    name: Web (vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - name: Install deps
        working-directory: web
        run: npm ci
      - name: Run tests
        working-directory: web
        run: npm test
