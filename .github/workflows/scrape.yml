name: Scrape KBO schedules

on:
  schedule:
    # 매일 09:00 KST (= 00:00 UTC) — 전날 경기 결과 반영
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      year:
        description: '단일 시즌만 (예: 2021). 비워두면 2021~현재 시즌 전부.'
        required: false
        default: ''
      month:
        description: '특정 월만 (예: 4). 비워두면 시즌 전체. 검증/디버깅용.'
        required: false
        default: ''

permissions:
  contents: write

concurrency:
  group: scrape-kbo
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scraper/requirements.txt

      - name: Install deps
        working-directory: scraper
        run: pip install -r requirements.txt

      - name: Build CLI args
        id: args
        run: |
          year="${{ github.event.inputs.year }}"
          month="${{ github.event.inputs.month }}"
          current_year=$(date -u +'%Y')
          if [ -n "$year" ]; then
            scope="--year $year"
          else
            scope="--years 2021-$current_year"
          fi
          if [ -n "$month" ]; then
            scope="$scope --month $month"
          fi
          echo "scope=$scope" >> "$GITHUB_OUTPUT"
          echo "Using: $scope"

      - name: Scrape
        working-directory: scraper
        run: python scrape_kbo.py ${{ steps.args.outputs.scope }}

      - name: Show output summary
        run: |
          echo "## Scrape result" >> "$GITHUB_STEP_SUMMARY"
          for f in data/seasons/*.json; do
            [ -e "$f" ] || continue
            count=$(python -c "import json,sys; print(len(json.load(open('$f'))['games']))")
            echo "- \`$f\`: **$count** games" >> "$GITHUB_STEP_SUMMARY"
          done

      - name: Commit & push if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/seasons/
          if git diff --staged --quiet; then
            echo "No data changes."
          else
            git commit -m "data: refresh KBO schedule ($(date -u +'%Y-%m-%d'))"
            git push
          fi
