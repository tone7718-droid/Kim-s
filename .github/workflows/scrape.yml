name: Scrape KBO schedules

on:
  # 워크플로 또는 스크래퍼 코드가 바뀌면 자동 실행 (data/ 변경은 무시 — 무한 루프 방지)
  push:
    branches:
      - main
      - claude/**
    paths:
      - 'scraper/**'
      - '.github/workflows/scrape.yml'
  schedule:
    # 매일 09:00 KST (= 00:00 UTC) — 전날 경기 결과 반영
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      year:
        description: '단일 시즌만 (예: 2021). 비워두면 2021~현재 시즌 전부.'
        required: false
        default: ''
      month:
        description: '특정 월만 (예: 4). 비워두면 시즌 전체. 검증/디버깅용.'
        required: false
        default: ''

permissions:
  contents: write

concurrency:
  group: scrape-kbo
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scraper/requirements.txt

      - name: Install deps
        working-directory: scraper
        run: pip install -r requirements.txt

      - name: Build CLI args
        id: args
        run: |
          year="${{ github.event.inputs.year }}"
          month="${{ github.event.inputs.month }}"
          current_year=$(date -u +'%Y')
          if [ -n "$year" ]; then
            scope="--year $year"
          else
            scope="--years 2021-$current_year"
          fi
          if [ -n "$month" ]; then
            scope="$scope --month $month"
          fi
          echo "scope=$scope" >> "$GITHUB_OUTPUT"
          echo "Using: $scope"

      - name: Scrape
        working-directory: scraper
        env:
          KBO_DEBUG_DUMP: ${{ github.workspace }}/data/_debug_naver.json
        run: python scrape_kbo.py ${{ steps.args.outputs.scope }}

      - name: Build human-readable summary
        run: |
          python - <<'PY'
          import json, glob, os
          rows = ["# KBO 스크래핑 결과 요약", ""]
          rows += [f"_생성 시각 (UTC): {os.environ.get('GITHUB_RUN_STARTED_AT','-')}_  ", ""]
          rows += ["| 시즌 | 총 경기 | 정상종료 | 무승부 | 취소 | 연기 | 미진행 |",
                   "|---|---|---|---|---|---|---|"]
          total = 0
          for f in sorted(glob.glob("data/seasons/*.json")):
              with open(f, encoding="utf-8") as fp:
                  payload = json.load(fp)
              g = payload["games"]
              status_counts = {"completed":0,"tied":0,"cancelled":0,"postponed":0,"scheduled":0}
              for x in g:
                  status_counts[x.get("status","scheduled")] = status_counts.get(x.get("status","scheduled"),0)+1
              year = payload["year"]
              rows.append(f"| {year} | **{len(g)}** | {status_counts['completed']} | {status_counts['tied']} | {status_counts['cancelled']} | {status_counts['postponed']} | {status_counts['scheduled']} |")
              total += len(g)
          rows += ["", f"**총 {total} 경기**", ""]
          rows += ["## 샘플 (각 시즌 첫 경기)", ""]
          for f in sorted(glob.glob("data/seasons/*.json")):
              with open(f, encoding="utf-8") as fp:
                  payload = json.load(fp)
              g = payload["games"]
              if not g:
                  rows.append(f"- {payload['year']}: (경기 없음)")
                  continue
              first = g[0]
              rows.append(f"- {payload['year']}: `{first['date']}` {first['awayTeam']} {first.get('awayScore','-')}:{first.get('homeScore','-')} {first['homeTeam']} ({first['status']})")
          # 모든 시즌이 0이면 진단 정보 추가.
          if total == 0:
              rows += ["", "## API 응답 진단", ""]
              dbg_path = "data/_debug_naver.json"
              if os.path.exists(dbg_path):
                  with open(dbg_path, encoding="utf-8") as fp:
                      diag = json.load(fp)
                  rows.append(f"- top-level keys: `{diag.get('topLevelKeys')}`")
                  rows.append(f"- result keys: `{diag.get('resultKeys')}`")
                  rows.append(f"- extracted game count: `{diag.get('extractedGameCount')}`")
                  rows.append(f"- first game keys: `{diag.get('firstGameKeys')}`")
                  fg = diag.get("firstGame")
                  if fg:
                      rows += ["", "첫 게임 raw:", "", "```json"]
                      rows.append(json.dumps(fg, ensure_ascii=False, indent=2)[:2000])
                      rows.append("```")
              else:
                  rows.append("(디버그 dump 파일 없음 — fetch 전에 죽은 듯)")
          os.makedirs("data", exist_ok=True)
          with open("data/_summary.md", "w", encoding="utf-8") as fp:
              fp.write("\n".join(rows) + "\n")
          # GitHub Step Summary에도 동일 내용 출력
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as fp:
              fp.write("\n".join(rows) + "\n")
          PY

      - name: Commit & push if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No data changes."
          else
            git commit -m "data: refresh KBO schedule ($(date -u +'%Y-%m-%d'))"
            git push
          fi
