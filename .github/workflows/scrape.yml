name: Scrape KBO schedules

on:
  # 워크플로 또는 스크래퍼 코드가 바뀌면 자동 실행 (data/ 변경은 무시 — 무한 루프 방지)
  push:
    branches:
      - main
      - claude/**
    paths:
      - 'scraper/**'
      - '.github/workflows/scrape.yml'
  schedule:
    # 매일 00:00 KST (= 15:00 UTC, 전날) — 어제 경기 결과 반영
    - cron: '0 15 * * *'
  workflow_dispatch:
    inputs:
      year:
        description: '단일 시즌만 (예: 2021). 비워두면 2021~현재 시즌 전부.'
        required: false
        default: ''
      month:
        description: '특정 월만 (예: 4). 비워두면 시즌 전체. 검증/디버깅용.'
        required: false
        default: ''

permissions:
  contents: write

concurrency:
  group: scrape-kbo-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scraper/requirements.txt

      - name: Install deps
        working-directory: scraper
        run: pip install -r requirements.txt

      - name: Build CLI args
        id: args
        run: |
          year="${{ github.event.inputs.year }}"
          month="${{ github.event.inputs.month }}"
          current_year=$(date -u +'%Y')
          if [ -n "$year" ]; then
            scope="--year $year"
          else
            scope="--years 2021-$current_year"
          fi
          if [ -n "$month" ]; then
            scope="$scope --month $month"
          fi
          echo "scope=$scope" >> "$GITHUB_OUTPUT"
          echo "Using: $scope"

      - name: Scrape
        working-directory: scraper
        env:
          KBO_DEBUG_DUMP: ${{ github.workspace }}/data/_debug_naver.json
        run: python scrape_kbo.py ${{ steps.args.outputs.scope }}

      - name: Validate scraped data
        run: python scraper/validate_kbo_data.py --data-dir data/seasons

      - name: Build human-readable summary
        run: |
          python - <<'PY'
          import json, glob, os
          rows = ["# KBO 스크래핑 결과 요약", ""]
          rows += [f"_생성 시각 (UTC): {os.environ.get('GITHUB_RUN_STARTED_AT','-')}_  ", ""]
          rows += ["사용자 선택: **정규시즌 + 포스트시즌만 합산** (시범경기는 별도 표시)", ""]
          rows += ["## 시즌별 요약 (정규+포스트시즌)", ""]
          rows += ["| 시즌 | 합산 경기 | 정상종료 | 무승부 | 취소 | 연기 | 미진행 | 네이버 ID |",
                   "|---|---|---|---|---|---|---|---|"]
          total_main = 0
          total_pre = 0
          per_season = []
          for f in sorted(glob.glob("data/seasons/*.json")):
              with open(f, encoding="utf-8") as fp:
                  payload = json.load(fp)
              g = payload["games"]
              year = payload["year"]
              by_cat = {"regular":[],"postseason":[],"preseason":[],"unknown":[]}
              for x in g:
                  by_cat.setdefault(x.get("category","unknown"), []).append(x)
              main = by_cat["regular"] + by_cat["postseason"] + by_cat["unknown"]
              pre = by_cat["preseason"]
