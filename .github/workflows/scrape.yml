              for x in main:
                  status_counts[x.get("status","scheduled")] = status_counts.get(x.get("status","scheduled"),0)+1
              naver_ids = sum(1 for x in main if x.get("naverGameId"))
              rows.append(f"| {year} | **{len(main)}** | {status_counts['completed']} | {status_counts['tied']} | {status_counts['cancelled']} | {status_counts['postponed']} | {status_counts['sche[...