name: Scrape KBO schedules

on:
  # 워크플로 또는 스크래퍼 코드가 바뀌면 자동 실행 (data/ 변경은 무시 — 무한 루프 방지)
  push:
    branches:
      - main
      - claude/**
    paths:
      - 'scraper/**'
      - '.github/workflows/scrape.yml'
  schedule:
    # 매일 00:00 KST (= 15:00 UTC, 전날) — 어제 경기 결과 반영
    - cron: '0 15 * * *'
  workflow_dispatch:
    inputs:
      year:
        description: '단일 시즌만 (예: 2021). 비워두면 2021~현재 시즌 전부.'
        required: false
        default: ''
      month:
        description: '특정 월만 (예: 4). 비워두면 시즌 전체. 검증/디버깅용.'
        required: false
        default: ''

permissions:
  contents: write

concurrency:
  group: scrape-kbo-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scraper/requirements.txt

      - name: Install deps
        working-directory: scraper
        run: pip install -r requirements.txt

      - name: Build CLI args
        id: args
        run: |
          year="${{ github.event.inputs.year }}"
          month="${{ github.event.inputs.month }}"
          current_year=$(date -u +'%Y')
          if [ -n "$year" ]; then
            scope="--year $year"
          else
            scope="--years 2021-$current_year"
          fi
          if [ -n "$month" ]; then
            scope="$scope --month $month"
          fi
          echo "scope=$scope" >> "$GITHUB_OUTPUT"
          echo "Using: $scope"

      - name: Scrape
        working-directory: scraper
        env:
          KBO_DEBUG_DUMP: ${{ github.workspace }}/data/_debug_naver.json
        run: python scrape_kbo.py ${{ steps.args.outputs.scope }}

      - name: Validate scraped data
        run: python scraper/validate_kbo_data.py --data-dir data/seasons

      - name: Build human-readable summary
        run: python scraper/build_summary.py

      - name: Commit & push if data changed
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/seasons/ data/_summary.md
          if git diff --staged --quiet; then
            echo "No data changes."
          else
            git commit -m "data: refresh KBO schedule ($(date -u +'%Y-%m-%d'))"
            # After committing the intended season JSON and summary, discard
            # any diagnostics/temp files left by the scrape before rebasing.
            # Git refuses to rebase with a dirty worktree.
            echo "Cleaning worktree before rebase..."
            git status --short
            git reset --hard HEAD
            git clean -fd
            git status --short
            git fetch origin main
            git rebase -X theirs origin/main
            python scraper/validate_kbo_data.py --data-dir data/seasons
            git push origin HEAD:main
          fi
